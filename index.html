<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Hey you 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Gloria+Hallelujah&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FFF6E9;
    --blush: #FBEAF0;
    --blush-2: #F4C0D1;
    --mascot: #F4A6BE;
    --coral: #F0997B;
    --cta: #D4537E;
    --rose: #993556;
    --sans: "Fredoka", system-ui, sans-serif;
    --hand: "Gloria Hallelujah", cursive;
    --line: 3px solid var(--rose);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--blush);
    color: var(--rose);
    display: flex; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 16px;
  }
  #card {
    width: 100%; max-width: 360px;
    background: var(--cream);
    border: var(--line);
    border-radius: 26px;
    padding: 22px 20px 20px;
    position: relative; overflow: hidden;
  }
  #stage { min-height: 360px; }
  .prompt { font-family: var(--hand); font-size: 22px; line-height: 1.35; text-align: center; margin: 6px 0 4px; }
  .sub { font-size: 13px; text-align: center; opacity: 0.75; margin: 0 0 18px; }
  .btn {
    display: block; width: 100%;
    font-family: var(--sans); font-weight: 500; font-size: 16px;
    border: var(--line); border-radius: 16px;
    padding: 12px; margin: 10px 0 0; text-align: center;
    background: var(--cream); color: var(--rose); cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }
  .btn:active { transform: scale(0.96); }
  .btn.primary { background: var(--cta); color: var(--cream); }
  #dots { display: flex; gap: 6px; justify-content: center; margin-top: 18px; }
  #dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--blush-2); transition: background .2s; }
  #dots span.on { background: var(--rose); }
  #mascot { display: block; margin: 0 auto -4px; width: 130px; height: 120px; }
  #mascot .eye-shut { display: none; }
  #mascot.blink .eye-open { display: none; }
  #mascot.blink .eye-shut { display: inline; }
  #mascot .arm { transform-origin: 104px 56px; }
  @keyframes bob { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-5px); } }
  @keyframes wave { 0%,100%{ transform: rotate(0deg); } 50%{ transform: rotate(-22deg); } }
  #mascot.mood-idle { animation: bob 3s ease-in-out infinite; }
  #mascot.mood-confident { animation: bob 2.4s ease-in-out infinite; }
  #mascot.mood-confident .arm { animation: wave 1.2s ease-in-out infinite; }
  #mascot.mood-ecstatic { animation: bob 0.5s ease-in-out infinite; }
  #mascot.mood-crushed { transform: translateY(6px) rotate(-3deg); }
  #mascot.mood-shy .cheek { fill: var(--coral); opacity: 1; }
  #mascot.mood-shy { transform: translateY(2px); }
  .cover-big { font-family: var(--hand); font-size: 30px; text-align: center; margin: 8px 0 2px; }
  .cover-small { font-size: 15px; text-align: center; opacity: 0.8; margin: 0 0 22px; }
  .heart-fly { position: absolute; font-size: 20px; pointer-events: none; animation: fly 1s ease-out forwards; }
  @keyframes fly { to { transform: translateY(-120px) scale(1.4); opacity: 0; } }
</style>
</head>
<body>
  <div id="card">
    <div id="mascot-slot">
      <svg id="mascot" class="mood-idle" viewBox="0 0 130 120" role="img" aria-label="Pebble the heart mascot">
        <path d="M65 108 C 18 76, 6 46, 28 27 C 44 13, 62 22, 65 40 C 68 22, 86 13, 102 27 C 124 46, 112 76, 65 108 Z" fill="var(--mascot)" stroke="var(--rose)" stroke-width="4.5" stroke-linejoin="round"/>
        <g class="eye-open">
          <ellipse cx="50" cy="52" rx="8" ry="9" fill="#fff" stroke="var(--rose)" stroke-width="3"/>
          <ellipse cx="80" cy="52" rx="8" ry="9" fill="#fff" stroke="var(--rose)" stroke-width="3"/>
          <circle cx="51" cy="54" r="3.4" fill="#3a1622"/>
          <circle cx="81" cy="54" r="3.4" fill="#3a1622"/>
        </g>
        <g class="eye-shut">
          <path d="M42 53 Q50 48 58 53" fill="none" stroke="var(--rose)" stroke-width="3" stroke-linecap="round"/>
          <path d="M72 53 Q80 48 88 53" fill="none" stroke="var(--rose)" stroke-width="3" stroke-linecap="round"/>
        </g>
        <ellipse class="cheek" cx="40" cy="66" rx="6" ry="4" fill="var(--coral)" opacity="0.8"/>
        <ellipse class="cheek" cx="90" cy="66" rx="6" ry="4" fill="var(--coral)" opacity="0.8"/>
        <path id="mouth" d="M58 68 Q65 74 72 68" fill="none" stroke="var(--rose)" stroke-width="3" stroke-linecap="round"/>
        <path class="arm" d="M104 58 Q116 54 114 44" fill="none" stroke="var(--rose)" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="stage"></div>
    <div id="dots"></div>
  </div>
<script>
  const CONFIG = {
    HER_NAME: "Milly",
    YOUR_NAME: "Jack",
    YOUR_PHONE: "+10000000000",            /* TODO Jack: put your real number here */
    YOUR_EMAIL: "jackantony01@yahoo.com",
    FRIEND_REF: "backup",
    days: ["Friday", "Saturday", "Sunday", "honestly whenever, I'm flexible (don't read into it)"],
    times: ["5pm — responsible, respectable", "7pm — peak dinner, peak vibes", "9pm — mysterious & a little dangerous", "you decide, I trust you (terrifying)"],
    activities: [
      "🍝 Dinner somewhere I'll pretend the prices don't scare me",
      "⛳ Mini golf, so you can witness my fake athletic confidence",
      "☕ Coffee + a walk — the \"I actually want to talk to you\" option",
      "🚗 A drive with a playlist I curated way too aggressively",
      "🎬 Movie, so we can not-talk together comfortably"
    ]
  };

  const answers = { day: null, time: null, activity: null, plusOne: null, ending: null };

  const STEPS = ["cover", "question", "day", "time", "activity", "plusOne", "ending", "payoff"];
  let step = 0;

  const stage = document.getElementById("stage");
  const dotsEl = document.getElementById("dots");
  const mascot = document.getElementById("mascot");
  const mouth = document.getElementById("mouth");
  const MOUTHS = {
    idle:      "M58 68 Q65 74 72 68",
    confident: "M56 68 Q65 76 74 67",
    ecstatic:  "M55 66 Q65 80 75 66",
    crushed:   "M58 72 Q65 66 72 72",
    smug:      "M57 69 Q66 73 73 66",
    shy:       "M60 70 Q65 73 70 70"
  };
  function setMascotMood(mood) {
    mascot.className = "mood-" + mood;
    mouth.setAttribute("d", MOUTHS[mood] || MOUTHS.idle);
  }
  setInterval(() => {
    mascot.classList.add("blink");
    setTimeout(() => mascot.classList.remove("blink"), 160);
  }, 3500);

  function renderDots() {
    dotsEl.innerHTML = STEPS.map((_, i) => `<span class="${i <= step ? "on" : ""}"></span>`).join("");
  }

  function goToStep(i) {
    step = i;
    renderCurrent();
    renderDots();
  }

  function heartBurst(n = 14) {
    const card = document.getElementById("card");
    for (let i = 0; i < n; i++) {
      const h = document.createElement("span");
      h.className = "heart-fly";
      h.textContent = ["💕", "💖", "💗", "🩷"][i % 4];
      h.style.left = (20 + Math.random() * 80) + "%";
      h.style.top = (40 + Math.random() * 30) + "%";
      h.style.animationDelay = (Math.random() * 0.25) + "s";
      card.appendChild(h);
      setTimeout(() => h.remove(), 1300);
    }
  }

  function renderCurrent() {
    const type = STEPS[step];
    if (type === "cover") return renderCover();
    if (type === "question") return renderQuestion();
    stage.innerHTML = "<p class='prompt'>step: " + type + "</p>"; // temporary until later tasks
  }

  function renderCover() {
    setMascotMood("confident");
    stage.innerHTML = `
      <p class="cover-big">Wassup baddie 😎</p>
      <p class="cover-small">…aka ${CONFIG.HER_NAME}</p>
      <button class="btn primary" id="enter">Enter</button>`;
    document.getElementById("enter").onclick = () => goToStep(1);
  }

  const NO_LABELS = ["No", "are you sure?", "that's not a no…", "ok, yes 🥺"];
  function renderQuestion() {
    setMascotMood("idle");
    stage.innerHTML = `
      <p class="prompt">You. Me. A date.</p>
      <p class="sub">I already know the answer — but go ahead and make it official. 😏</p>
      <button class="btn primary" id="yes">Yes 💕</button>
      <button class="btn" id="no">No</button>`;
    let noStage = 0;
    document.getElementById("yes").onclick = () => {
      setMascotMood("ecstatic");
      heartBurst();
      setTimeout(() => goToStep(2), 750);
    };
    const noBtn = document.getElementById("no");
    noBtn.onclick = () => {
      noStage++;
      if (noStage >= NO_LABELS.length - 1) {
        noBtn.textContent = NO_LABELS[NO_LABELS.length - 1];
        setMascotMood("ecstatic");
        heartBurst();
        setTimeout(() => goToStep(2), 750);
      } else {
        noBtn.textContent = NO_LABELS[noStage];
        setMascotMood("crushed");
      }
    };
  }

  goToStep(0);
</script>
</body>
</html>
