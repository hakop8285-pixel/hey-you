<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Hey you 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Gloria+Hallelujah&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FFF6E9;
    --blush: #FBEAF0;
    --blush-2: #F4C0D1;
    --mascot: #F4A6BE;
    --coral: #F0997B;
    --cta: #D4537E;
    --rose: #993556;
    --sans: "Fredoka", system-ui, sans-serif;
    --hand: "Gloria Hallelujah", cursive;
    --line: 3px solid var(--rose);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--blush);
    color: var(--rose);
    display: flex; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 16px;
  }
  #card {
    width: 100%; max-width: 360px;
    background: var(--cream);
    border: var(--line);
    border-radius: 26px;
    padding: 22px 20px 20px;
    position: relative; overflow: hidden;
  }
  #stage { min-height: 360px; }
  .prompt { font-family: var(--hand); font-size: 22px; line-height: 1.35; text-align: center; margin: 6px 0 4px; }
  .sub { font-size: 13px; text-align: center; opacity: 0.75; margin: 0 0 18px; }
  .btn {
    display: block; width: 100%;
    font-family: var(--sans); font-weight: 500; font-size: 16px;
    border: var(--line); border-radius: 16px;
    padding: 12px; margin: 10px 0 0; text-align: center;
    background: var(--cream); color: var(--rose); cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }
  .btn:active { transform: scale(0.96); }
  .btn.primary { background: var(--cta); color: var(--cream); }
  #dots { display: flex; gap: 6px; justify-content: center; margin-top: 18px; }
  #dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--blush-2); transition: background .2s; }
  #dots span.on { background: var(--rose); }
  #mascot { display: block; margin: 0 auto -4px; width: 130px; height: 120px; }
  #mascot .eye-shut { display: none; }
  #mascot.blink .eye-open { display: none; }
  #mascot.blink .eye-shut { display: inline; }
  #mascot .arm { transform-origin: 104px 56px; }
  @keyframes bob { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-5px); } }
  @keyframes wave { 0%,100%{ transform: rotate(0deg); } 50%{ transform: rotate(-22deg); } }
  #mascot.mood-idle { animation: bob 3s ease-in-out infinite; }
  #mascot.mood-confident { animation: bob 2.4s ease-in-out infinite; }
  #mascot.mood-confident .arm { animation: wave 1.2s ease-in-out infinite; }
  #mascot.mood-ecstatic { animation: bob 0.5s ease-in-out infinite; }
  #mascot.mood-crushed { transform: translateY(6px) rotate(-3deg); }
  #mascot.mood-shy .cheek { fill: var(--coral); opacity: 1; }
  #mascot.mood-shy { transform: translateY(2px); }
  .cover-big { font-family: var(--hand); font-size: 30px; text-align: center; margin: 8px 0 2px; }
  .cover-small { font-size: 15px; text-align: center; opacity: 0.8; margin: 0 0 22px; }
  .heart-fly { position: absolute; font-size: 20px; pointer-events: none; animation: fly 1s ease-out forwards; }
  @keyframes fly { to { transform: translateY(-120px) scale(1.4); opacity: 0; } }
  .reaction { font-family: var(--hand); font-size: 16px; text-align: center; min-height: 22px; margin: 14px 0 0; color: var(--cta); }
  .itin { list-style: none; padding: 0; margin: 10px 0 4px; }
  .itin li { font-size: 15px; padding: 8px 0; border-bottom: 2px dotted var(--blush-2); display: flex; gap: 8px; opacity: 0; transform: translateY(6px); animation: lineIn .4s ease forwards; }
  .itin li b { color: var(--cta); }
  @keyframes lineIn { to { opacity: 1; transform: translateY(0); } }
  .signoff { font-family: var(--hand); text-align: center; margin: 14px 0 16px; }
  .email-link { display: block; text-align: center; font-size: 13px; margin-top: 10px; color: var(--rose); }
  #stage { animation: stageIn .35s ease; }
  @keyframes stageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 380px) { #card { padding: 18px 16px; } .cover-big { font-size: 26px; } .prompt { font-size: 20px; } }
</style>
</head>
<body>
  <div id="card">
    <div id="mascot-slot">
      <svg id="mascot" class="mood-idle" viewBox="0 0 130 120" role="img" aria-label="Pebble the heart mascot">
        <path d="M65 108 C 18 76, 6 46, 28 27 C 44 13, 62 22, 65 40 C 68 22, 86 13, 102 27 C 124 46, 112 76, 65 108 Z" fill="var(--mascot)" stroke="var(--rose)" stroke-width="4.5" stroke-linejoin="round"/>
        <g class="eye-open">
          <ellipse cx="50" cy="52" rx="8" ry="9" fill="#fff" stroke="var(--rose)" stroke-width="3"/>
          <ellipse cx="80" cy="52" rx="8" ry="9" fill="#fff" stroke="var(--rose)" stroke-width="3"/>
          <circle cx="51" cy="54" r="3.4" fill="#3a1622"/>
          <circle cx="81" cy="54" r="3.4" fill="#3a1622"/>
        </g>
        <g class="eye-shut">
          <path d="M42 53 Q50 48 58 53" fill="none" stroke="var(--rose)" stroke-width="3" stroke-linecap="round"/>
          <path d="M72 53 Q80 48 88 53" fill="none" stroke="var(--rose)" stroke-width="3" stroke-linecap="round"/>
        </g>
        <ellipse class="cheek" cx="40" cy="66" rx="6" ry="4" fill="var(--coral)" opacity="0.8"/>
        <ellipse class="cheek" cx="90" cy="66" rx="6" ry="4" fill="var(--coral)" opacity="0.8"/>
        <path id="mouth" d="M58 68 Q65 74 72 68" fill="none" stroke="var(--rose)" stroke-width="3" stroke-linecap="round"/>
        <path class="arm" d="M104 58 Q116 54 114 44" fill="none" stroke="var(--rose)" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="stage"></div>
    <div id="dots"></div>
  </div>
<script>
  const CONFIG = {
    HER_NAME: "Milly",
    YOUR_NAME: "Jack",
    YOUR_PHONE: "+10000000000",            /* TODO Jack: put your real number here */
    YOUR_EMAIL: "jackantony01@yahoo.com",
    FRIEND_REF: "backup",
    days: ["Friday", "Saturday", "Sunday", "honestly whenever, I'm flexible (don't read into it)"],
    times: ["5pm — responsible, respectable", "7pm — peak dinner, peak vibes", "9pm — mysterious & a little dangerous", "you decide, I trust you (terrifying)"],
    activities: [
      "🍝 Dinner somewhere I'll pretend the prices don't scare me",
      "⛳ Mini golf, so you can witness my fake athletic confidence",
      "☕ Coffee + a walk — the \"I actually want to talk to you\" option",
      "🚗 A drive with a playlist I curated way too aggressively",
      "🎬 Movie, so we can not-talk together comfortably"
    ]
  };

  const answers = { day: null, time: null, activity: null, plusOne: null, ending: null };

  const STEPS = ["cover", "question", "day", "time", "activity", "plusOne", "ending", "payoff"];
  let step = 0;

  const stage = document.getElementById("stage");
  const dotsEl = document.getElementById("dots");
  const mascot = document.getElementById("mascot");
  const mouth = document.getElementById("mouth");
  const MOUTHS = {
    idle:      "M58 68 Q65 74 72 68",
    confident: "M56 68 Q65 76 74 67",
    ecstatic:  "M55 66 Q65 80 75 66",
    crushed:   "M58 72 Q65 66 72 72",
    smug:      "M57 69 Q66 73 73 66",
    shy:       "M60 70 Q65 73 70 70"
  };
  function setMascotMood(mood) {
    mascot.className = "mood-" + mood;
    mouth.setAttribute("d", MOUTHS[mood] || MOUTHS.idle);
  }
  setInterval(() => {
    mascot.classList.add("blink");
    setTimeout(() => mascot.classList.remove("blink"), 160);
  }, 3500);

  function renderDots() {
    dotsEl.innerHTML = STEPS.map((_, i) => `<span class="${i <= step ? "on" : ""}"></span>`).join("");
  }

  function goToStep(i) {
    step = i;
    renderCurrent();
    renderDots();
  }

  function heartBurst(n = 14) {
    const card = document.getElementById("card");
    for (let i = 0; i < n; i++) {
      const h = document.createElement("span");
      h.className = "heart-fly";
      h.textContent = ["💕", "💖", "💗", "🩷"][i % 4];
      h.style.left = (20 + Math.random() * 80) + "%";
      h.style.top = (40 + Math.random() * 30) + "%";
      h.style.animationDelay = (Math.random() * 0.25) + "s";
      card.appendChild(h);
      setTimeout(() => h.remove(), 1300);
    }
  }

  function ambientHearts() {
    const card = document.getElementById("card");
    [..."💗💕"].forEach((c, i) => {
      const h = document.createElement("span");
      h.className = "heart-fly";
      h.textContent = c;
      h.style.left = (15 + i * 55) + "%";
      h.style.top = "85%";
      h.style.opacity = "0.5";
      h.style.animationDuration = "2.4s";
      card.appendChild(h);
      setTimeout(() => h.remove(), 2500);
    });
  }

  function buildSummary() {
    return [
      `💌 It's a date, ${CONFIG.YOUR_NAME}!`,
      `Day: ${answers.day}`,
      `Time: ${answers.time}`,
      `Doing: ${answers.activity}`,
      `Moral support: ${answers.plusOne}`,
      `How it ends: ${answers.ending}`,
      `— from ${CONFIG.HER_NAME}`
    ].join("\n");
  }

  function renderCurrent() {
    stage.style.animation = "none"; void stage.offsetWidth; stage.style.animation = "";
    const type = STEPS[step];
    if (type === "cover") return renderCover();
    if (type === "question") return renderQuestion();
    if (type === "day") return renderChoice({
      key: "day", nextStep: 3, prompt: "When are you free to be charmed?",
      options: CONFIG.days
    });
    if (type === "time") return renderChoice({
      key: "time", nextStep: 4, prompt: "And what time?",
      options: CONFIG.times
    });
    if (type === "activity") return renderChoice({
      key: "activity", nextStep: 5, prompt: "So what are we actually doing?",
      options: CONFIG.activities
    });
    if (type === "plusOne") return renderPlusOne();
    if (type === "ending") return renderEnding();
    if (type === "payoff") return renderPayoff();
  }

  function renderCover() {
    setMascotMood("confident");
    stage.innerHTML = `
      <p class="cover-big">Wassup baddie 😎</p>
      <p class="cover-small">…aka ${CONFIG.HER_NAME}</p>
      <button class="btn primary" id="enter">Enter</button>`;
    document.getElementById("enter").onclick = () => goToStep(1);
    ambientHearts();
  }

  const NO_LABELS = ["No", "are you sure?", "that's not a no…", "ok, yes 🥺"];
  function renderQuestion() {
    setMascotMood("idle");
    stage.innerHTML = `
      <p class="prompt">You. Me. A date.</p>
      <p class="sub">I already know the answer — but go ahead and make it official. 😏</p>
      <button class="btn primary" id="yes">Yes 💕</button>
      <button class="btn" id="no">No</button>`;
    let noStage = 0;
    document.getElementById("yes").onclick = () => {
      setMascotMood("ecstatic");
      heartBurst();
      setTimeout(() => goToStep(2), 750);
    };
    const noBtn = document.getElementById("no");
    noBtn.onclick = () => {
      noStage++;
      if (noStage >= NO_LABELS.length - 1) {
        noBtn.textContent = NO_LABELS[NO_LABELS.length - 1];
        setMascotMood("ecstatic");
        heartBurst();
        setTimeout(() => goToStep(2), 750);
      } else {
        noBtn.textContent = NO_LABELS[noStage];
        setMascotMood("crushed");
      }
    };
  }

  function renderChoice({ key, prompt, sub, options, nextStep, mood }) {
    setMascotMood(mood || "idle");
    stage.innerHTML =
      `<p class="prompt">${prompt}</p>` +
      (sub ? `<p class="sub">${sub}</p>` : "") +
      options.map((o, i) => `<button class="btn" data-i="${i}">${o}</button>`).join("");
    stage.querySelectorAll("button[data-i]").forEach(btn => {
      btn.onclick = () => {
        answers[key] = options[Number(btn.dataset.i)];
        setMascotMood("ecstatic");
        setTimeout(() => goToStep(nextStep), 450);
      };
    });
  }

  function renderPlusOne() {
    setMascotMood("smug");
    stage.innerHTML = `
      <p class="prompt">Bringing ${CONFIG.FRIEND_REF} for moral support again? 👀</p>
      <button class="btn" data-v="yes">Yes, obviously</button>
      <button class="btn" data-v="no">No, I'm brave now</button>
      <p class="reaction" id="reaction"></p>`;
    const reaction = document.getElementById("reaction");
    stage.querySelectorAll("button[data-v]").forEach(btn => {
      btn.onclick = () => {
        const yes = btn.dataset.v === "yes";
        answers.plusOne = yes ? "bringing backup" : "flying solo";
        reaction.textContent = yes
          ? "understood. she may supervise from a safe distance."
          : "brave. I respect it.";
        setMascotMood(yes ? "smug" : "ecstatic");
        setTimeout(() => goToStep(6), 1100);
      };
    });
  }

  function renderEnding() {
    setMascotMood("shy");
    const opts = [
      { label: "🤗 side hug", val: "a side hug", mood: "smug" },
      { label: "😚 kiss on the cheek", val: "a kiss on the cheek", mood: "shy" },
      { label: "😏 we'll find out", val: "we'll find out 😏", mood: "shy" }
    ];
    stage.innerHTML =
      `<p class="prompt">And how does the night end…?</p>` +
      opts.map((o, i) => `<button class="btn" data-i="${i}">${o.label}</button>`).join("");
    stage.querySelectorAll("button[data-i]").forEach(btn => {
      btn.onclick = () => {
        const o = opts[Number(btn.dataset.i)];
        answers.ending = o.val;
        setMascotMood(o.mood);
        heartBurst(8);
        setTimeout(() => goToStep(7), 750);
      };
    });
  }

  function renderPayoff() {
    setMascotMood("ecstatic");
    const rows = [
      ["Day", answers.day],
      ["Time", answers.time],
      ["Doing", answers.activity],
      ["Moral support", answers.plusOne],
      ["How it ends", answers.ending]
    ];
    stage.innerHTML = `
      <p class="prompt">It's a date. Here's the damage:</p>
      <ul class="itin">${rows.map((r, i) =>
        `<li style="animation-delay:${i * 0.18}s"><b>${r[0]}:</b><span>${r[1] ?? "—"}</span></li>`).join("")}
      </ul>
      <p class="signoff">can't wait. — ${CONFIG.YOUR_NAME}</p>
      <button class="btn primary" id="send">send this to ${CONFIG.YOUR_NAME} →</button>
      <a class="email-link" id="email-link" href="#">email it instead</a>`;

    const body = encodeURIComponent(buildSummary());
    const phone = CONFIG.YOUR_PHONE.replace(/[^+\d]/g, "");
    document.getElementById("send").onclick = () => {
      window.location.href = `sms:${phone}?&body=${body}`;
    };
    const mail = document.getElementById("email-link");
    mail.href = `mailto:${CONFIG.YOUR_EMAIL}?subject=${encodeURIComponent("It's a date 💌")}&body=${body}`;
  }

  goToStep(0);
</script>
</body>
</html>
